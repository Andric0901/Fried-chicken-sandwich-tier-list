name: CI/CD Pipeline
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-general:
    name: General Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run General Tests
      run: make test-general
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: general-test-results
        path: |
          *.log
        if-no-files-found: ignore

  test-editor-api:
    name: Editor API Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Editor API Tests
      run: make test-editor
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: editor-api-test-results
        path: |
          *.log
        if-no-files-found: ignore

  test-editor-dynamic:
    name: Dynamic Browser Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run Dynamic Browser Tests
      run: make test-dynamic
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dynamic-test-results
        path: |
          *.log
          test_failure.png
        if-no-files-found: ignore

  deploy:
    name: Deploy to Oracle VM
    needs: [test-general, test-editor-api, test-editor-dynamic]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: SSH and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ${{ secrets.ORACLE_USER }}
        key: ${{ secrets.ORACLE_SSH_KEY }}
        script: |
          cd /home/ubuntu/Fried-chicken-sandwich-tier-list
          ./autodeploy.sh
