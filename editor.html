<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fried Chicken Sandwich Tier List Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="editor.css">
</head>

<body>
    <div id="loading-overlay">
        <div class="loading-content">
            <h2>Loading Tier List...</h2>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="progress-text">0%</div>
        </div>
    </div>

    <div class="unassigned-btn-container">
        <button id="unassigned-btn" class="unassigned-btn">
            Unassigned <span id="unassigned-badge" class="badge">0</span>
        </button>
        <div id="unassigned-dropdown" class="dropdown-menu">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="year-toggle-container">
        <button id="toggle-year-first" class="year-toggle-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <path d="M8 14h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M16 14h.01"></path>
                <path d="M8 18h.01"></path>
                <path d="M12 18h.01"></path>
                <path d="M16 18h.01"></path>
            </svg>
        </button>
        <button id="toggle-year-rerank" class="year-toggle-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <path d="M12 14v4"></path>
                <path d="M10 16h4"></path>
            </svg>
        </button>
    </div>

    <div class="controls">
        <div class="zoom-controls">
            <button id="zoom-default" title="Default Zoom">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
            </button>
            <button id="zoom-out" title="Zoom Out">-</button>
            <span id="zoom-value">35%</span>
            <button id="zoom-in" title="Zoom In">+</button>
        </div>
        <button id="run-tierlist-btn" class="run-tierlist-btn">Run tierlist.py</button>
    </div>

    <header>
        <h1>Fried Chicken Sandwich Tier List Builder</h1>
        <p>Drag and drop logos to move restaurants between tiers or reorder within a tier. Auto-saves locally!</p>
    </header>

    <div style="text-align: center; width: 100%; overflow-x: auto;">
        <div id="tierlist-container" style="zoom: 0.35;">
            <!-- Generated dynamically -->
        </div>
    </div>

    <div id="save-indicator" class="save-indicator">Saving...</div>
    <div id="tooltip" class="tooltip"></div>

    <!-- Edit Modal -->
    <div id="edit-modal">
        <button id="nav-prev" class="modal-nav btn-nav-left" title="Previous Restaurant"></button>
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-img" src="" alt="Logo Preview">
            </div>
            <div class="modal-right">
                <h2 id="modal-title">Edit Metadata</h2>
                <form id="edit-form">
                    <input type="hidden" id="edit-original-name">
                    <input type="hidden" id="edit-original-tier">
                    <input type="hidden" id="edit-original-price">
                    <input type="hidden" id="edit-mode"> <!-- 'edit' or 'create' -->
                    <input type="hidden" id="edit-logo-path">

                    <div class="form-group">
                        <label>Restaurant Name</label>
                        <input type="text" id="edit-name" required placeholder="e.g. KFC">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tier</label>
                            <select id="edit-tier">
                                <option value="S">S</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="E">E</option>
                                <option value="F">F</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <select id="edit-price">
                                <option value="1">$</option>
                                <option value="2">$$</option>
                                <option value="3">$$$</option>
                                <option value="4">$$$$</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Year Re-ranked</label>
                            <input type="number" id="edit-year" placeholder="YYYY" required>
                        </div>
                        <div class="form-group">
                            <label>Year First Visited</label>
                            <input type="number" id="edit-year-first" placeholder="YYYY" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="edit-address" placeholder="123 Street Ave" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="edit-description" rows="3" placeholder="Brief description..." required></textarea>
                    </div>

                    <div class="checkbox-group">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="edit-vegan">
                            <label for="edit-vegan">Vegan</label>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="edit-highlighted">
                            <label for="edit-highlighted">Force Highlight (Re-ranked)</label>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
                        <button type="submit" class="btn btn-save" id="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
        <button id="nav-next" class="modal-nav btn-nav-right" title="Next Restaurant"></button>
    </div>

    <script src="editor.js"></script>
</body>

</html>
