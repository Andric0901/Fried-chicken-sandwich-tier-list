<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fried Chicken Sandwich Tier List Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #000000;
            --text-color: #ffffff;
            --tier-s: #ff7f7f;
            --tier-a: #ffbf7f;
            --tier-b: #ffff7f;
            --tier-c: #7fff7f;
            --tier-d: #7fbfff;
            --tier-e: #7f7fff;
            --tier-f: #ff7fff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 900;
            letter-spacing: -1px;
            font-size: 2.5rem;
            margin: 0;
            color: #ffffff;
        }

        p {
            color: #ccc;
        }

        #tierlist-container {
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
            margin: 0 auto;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .zoom-controls {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
        }

        .zoom-controls button {
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            width: 30px;
            height: 30px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .zoom-controls button:hover {
            background: #444;
        }

        .zoom-controls span {
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .run-tierlist-btn {
            background: linear-gradient(135deg, #ff7f7f, #ffbf7f);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 127, 127, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .run-tierlist-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 127, 127, 0.6);
        }

        .run-tierlist-btn:active {
            transform: translateY(0);
        }

        .tier-row {
            display: flex;
            margin-bottom: 20px;
            gap: 20px;
        }

        .tier-label {
            min-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            color: #000;
            border-radius: 4px;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.3);
        }

        .tier-content {
            display: grid;
            gap: 10px;
            background-color: var(--bg-color);
            padding: 10px;
            flex-grow: 1;
            min-height: 200px;
            border-radius: 4px;
            grid-template-columns: repeat(var(--columns, 17), 200px);
            grid-auto-rows: 200px;
            transition: background-color 0.2s;
        }

        .tier-content.drag-over {
            background-color: #333;
        }

        .logo-item-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            border-radius: 8px;
            background-color: #222;
        }

        .logo-item-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo-item-wrapper:active {
            cursor: grabbing;
        }

        .logo-item-wrapper.dragging {
            opacity: 0.5;
            transform: scale(1.05);
            z-index: 100;
        }

        .logo-item {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
            pointer-events: none;
        }

        .price-tag {
            position: absolute;
            top: 0;
            right: 0;
            height: 40px;
            width: auto;
            pointer-events: none;
        }

        .vegan-tag {
            position: absolute;
            bottom: 0;
            right: 0;
            height: 40px;
            width: auto;
            pointer-events: none;
        }

        /* Tier Colors */
        .tier-label[data-tier="S"] {
            background-color: var(--tier-s);
        }

        .tier-label[data-tier="A"] {
            background-color: var(--tier-a);
        }

        .tier-label[data-tier="B"] {
            background-color: var(--tier-b);
        }

        .tier-label[data-tier="C"] {
            background-color: var(--tier-c);
        }

        .tier-label[data-tier="D"] {
            background-color: var(--tier-d);
        }

        .tier-label[data-tier="E"] {
            background-color: var(--tier-e);
        }

        .tier-label[data-tier="F"] {
            background-color: var(--tier-f);
        }

        .error {
            color: #ff7f7f;
            text-align: center;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .save-indicator.saving {
            display: block;
            color: #ffff7f;
        }

        .save-indicator.saved {
            display: block;
            color: #7fff7f;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #555;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        /* Unassigned Dropdown */
        .unassigned-btn-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .unassigned-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .unassigned-btn:hover {
            background: rgba(50, 50, 50, 0.8);
        }

        .badge {
            background: #ff4747;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 900;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            width: 250px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-item:hover {
            background: #444;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        /* Full Screen Edit Modal */
        #edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            display: flex;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            width: 80vw;
            max-width: 1000px;
            height: clamp(550px, 75vh, 800px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        .modal-left {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        #modal-img {
            width: 250px;
            height: 250px;
            object-fit: contain;
        }

        .modal-right {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #edit-form {
            width: 100%;
        }

        .modal-right h2 {
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 15px;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffbf7f;
        }

        .invalid-input {
            border-color: #ff4747 !important;
            background-color: #3a1a1a !important;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: #444;
            color: #fff;
        }

        .btn-cancel:hover {
            background: #555;
        }

        .btn-save {
            background: #7fff7f;
            color: #000;
        }

        .btn-save:hover {
            background: #6fdf6f;
        }
    </style>
</head>

<body>

    <div class="unassigned-btn-container">
        <button id="unassigned-btn" class="unassigned-btn">
            Unassigned <span id="unassigned-badge" class="badge">0</span>
        </button>
        <div id="unassigned-dropdown" class="dropdown-menu">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="controls">
        <div class="zoom-controls">
            <button id="zoom-out" title="Zoom Out">-</button>
            <span id="zoom-value">35%</span>
            <button id="zoom-in" title="Zoom In">+</button>
        </div>
        <button id="run-tierlist-btn" class="run-tierlist-btn">Export imgs</button>
    </div>

    <header>
        <h1>Fried Chicken Sandwich Tier List Builder</h1>
        <p>Drag and drop logos to move restaurants between tiers or reorder within a tier. Auto-saves locally!</p>
    </header>

    <div style="text-align: center; width: 100%; overflow-x: auto;">
        <div id="tierlist-container" style="zoom: 0.35;">
            <!-- Generated dynamically -->
        </div>
    </div>

    <div id="save-indicator" class="save-indicator">Saving...</div>
    <div id="tooltip" class="tooltip"></div>

    <!-- Edit Modal -->
    <div id="edit-modal">
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-img" src="" alt="Logo Preview">
            </div>
            <div class="modal-right">
                <h2 id="modal-title">Edit Metadata</h2>
                <form id="edit-form">
                    <input type="hidden" id="edit-original-name">
                    <input type="hidden" id="edit-mode"> <!-- 'edit' or 'create' -->
                    <input type="hidden" id="edit-logo-path">

                    <div class="form-group">
                        <label>Restaurant Name</label>
                        <input type="text" id="edit-name" required placeholder="e.g. KFC">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tier</label>
                            <select id="edit-tier">
                                <option value="S">S</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="E">E</option>
                                <option value="F">F</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <select id="edit-price">
                                <option value="1">$</option>
                                <option value="2">$$</option>
                                <option value="3">$$$</option>
                                <option value="4">$$$$</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Year Re-ranked</label>
                            <input type="number" id="edit-year" placeholder="YYYY" required>
                        </div>
                        <div class="form-group">
                            <label>Year First Visited</label>
                            <input type="number" id="edit-year-first" placeholder="YYYY" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="edit-address" placeholder="123 Street Ave" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="edit-description" rows="3" placeholder="Brief description..." required></textarea>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="edit-vegan">
                        <label for="edit-vegan">Vegan</label>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
                        <button type="submit" class="btn btn-save" id="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('tierlist-container');
        const saveIndicator = document.getElementById('save-indicator');
        const tooltip = document.getElementById('tooltip');

        let currentZoom = 35;
        const zoomValue = document.getElementById('zoom-value');
        const zoomOutBtn = document.getElementById('zoom-out');
        const zoomInBtn = document.getElementById('zoom-in');

        function applyZoom() {
            zoomValue.textContent = currentZoom + '%';
            container.style.zoom = currentZoom / 100;
        }

        zoomOutBtn.addEventListener('click', () => {
            if (currentZoom > 5) {
                currentZoom -= 5;
                applyZoom();
            }
        });

        zoomInBtn.addEventListener('click', () => {
            if (currentZoom < 200) {
                currentZoom += 5;
                applyZoom();
            }
        });

        // Run Tierlist Button Logic
        const runTierlistBtn = document.getElementById('run-tierlist-btn');
        runTierlistBtn.addEventListener('click', async () => {
            runTierlistBtn.textContent = 'Running...';
            runTierlistBtn.disabled = true;
            runTierlistBtn.style.opacity = '0.7';

            try {
                const res = await fetch('/api/run_tierlist', { method: 'POST' });
                if (res.ok) {
                    saveIndicator.textContent = 'Successfully generated tierlist.png!';
                    saveIndicator.className = 'save-indicator saved';
                } else {
                    throw new Error('Script failed');
                }
            } catch (err) {
                saveIndicator.textContent = 'Error running script!';
                saveIndicator.className = 'save-indicator error';
            } finally {
                runTierlistBtn.textContent = 'Export imgs';
                runTierlistBtn.disabled = false;
                runTierlistBtn.style.opacity = '1';

                setTimeout(() => {
                    saveIndicator.style.display = "";
                    saveIndicator.className = "save-indicator";
                }, 3000);
            }
        });

        let globalTierDict = {};
        let unassignedLogos = []; // list of logo paths

        // DOM elements for Modal and Dropdown
        const unassignedBtn = document.getElementById('unassigned-btn');
        const unassignedDropdown = document.getElementById('unassigned-dropdown');
        const unassignedBadge = document.getElementById('unassigned-badge');

        const editModal = document.getElementById('edit-modal');
        const modalImg = document.getElementById('modal-img');
        const editForm = document.getElementById('edit-form');
        const btnCancel = document.getElementById('btn-cancel');

        unassignedBtn.addEventListener('click', () => {
            unassignedDropdown.classList.toggle('show');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!unassignedBtn.contains(e.target) && !unassignedDropdown.contains(e.target)) {
                unassignedDropdown.classList.remove('show');
            }
        });

        // Close modal when clicking outside
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                btnCancel.click();
            }
        });

        btnCancel.addEventListener('click', () => {
            editModal.style.opacity = '0';
            setTimeout(() => { editModal.style.display = 'none'; }, 300);
        });

        async function init() {
            try {
                // Fetch logos and dict in parallel
                const [dataRes, logosRes] = await Promise.all([
                    fetch('/api/data'),
                    fetch('/api/logos')
                ]);

                if (!dataRes.ok || !logosRes.ok) throw new Error('Failed to fetch from server');

                const data = await dataRes.json();
                const logosData = await logosRes.json();

                globalTierDict = data.tier_dict;
                const columns = data.num_logos_per_row || 17;

                // Determine unassigned logos
                const allExtractedLogos = new Set();
                Object.values(globalTierDict).forEach(tierObj => {
                    Object.values(tierObj).forEach(info => {
                        allExtractedLogos.add(info.path_to_logo_image.toLowerCase());
                    });
                });

                unassignedLogos = logosData.logos.filter(l => !allExtractedLogos.has(`logos/${l}`.toLowerCase()));
                updateUnassignedDropdown();

                render(columns);
            } catch (err) {
                container.innerHTML = `<div class="error"><h2>Error!</h2><p>${err.message}</p><p>Make sure editor_server.py is running on port 8000.</p></div>`;
            }
        }

        function updateUnassignedDropdown() {
            unassignedBadge.textContent = unassignedLogos.length;
            unassignedDropdown.innerHTML = '';

            if (unassignedLogos.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'dropdown-item';
                empty.textContent = 'None';
                empty.style.color = '#888';
                empty.style.cursor = 'default';
                unassignedDropdown.appendChild(empty);
                return;
            }

            unassignedLogos.forEach(logo => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = logo.replace(/\.[^/.]+$/, ""); // remove extension for display
                item.addEventListener('click', () => {
                    unassignedDropdown.classList.remove('show');
                    openCreateModal(logo);
                });
                unassignedDropdown.appendChild(item);
            });
        }

        function render(columns) {
            container.innerHTML = '';
            const tiers = ['S', 'A', 'B', 'C', 'D', 'E', 'F'];

            tiers.forEach(tier => {
                const row = document.createElement('div');
                row.className = 'tier-row';

                const label = document.createElement('div');
                label.className = 'tier-label';
                label.dataset.tier = tier;
                label.textContent = tier;

                const content = document.createElement('div');
                content.className = 'tier-content';
                content.dataset.tier = tier;
                content.style.setProperty('--columns', columns);

                const restaurants = globalTierDict[tier];
                if (restaurants) {
                    Object.keys(restaurants).forEach(name => {
                        const info = restaurants[name];

                        const wrapper = document.createElement('div');
                        wrapper.className = 'logo-item-wrapper';
                        wrapper.dataset.name = name;
                        wrapper.dataset.tier = tier;
                        wrapper.draggable = true;

                        const img = document.createElement('img');
                        img.src = info.path_to_logo_image;
                        img.className = 'logo-item';
                        img.alt = name;
                        img.loading = "lazy";
                        img.decoding = "async";

                        wrapper.appendChild(img);

                        if (info.price) {
                            const priceImg = document.createElement('img');
                            priceImg.src = `assets/png/${info.price}.png`;
                            priceImg.className = 'price-tag';
                            wrapper.appendChild(priceImg);
                        }

                        if (info.vegan) {
                            const veganImg = document.createElement('img');
                            veganImg.src = `assets/png/Vegan.png`;
                            veganImg.className = 'vegan-tag';
                            wrapper.appendChild(veganImg);
                        }

                        // Tooltip
                        wrapper.addEventListener('mouseenter', e => {
                            tooltip.textContent = name;
                            tooltip.style.opacity = '1';
                        });

                        wrapper.addEventListener('mousemove', e => {
                            tooltip.style.left = (e.pageX + 15) + 'px';
                            tooltip.style.top = (e.pageY + 15) + 'px';
                        });

                        wrapper.addEventListener('mouseleave', e => {
                            tooltip.style.opacity = '0';
                        });

                        // Drag events
                        wrapper.addEventListener('dragstart', handleDragStart);
                        wrapper.addEventListener('dragend', handleDragEnd);

                        // Double Click to Edit
                        wrapper.addEventListener('dblclick', function () {
                            const curName = this.dataset.name;
                            const curTier = this.dataset.tier;
                            const curInfo = globalTierDict[curTier][curName];
                            openEditModal(curName, curTier, curInfo);
                        });

                        content.appendChild(wrapper);
                    });
                }

                content.addEventListener('dragover', handleDragOver);
                content.addEventListener('dragleave', handleDragLeave);
                content.addEventListener('drop', handleDrop);

                row.appendChild(label);
                row.appendChild(content);
                container.appendChild(row);
            });
        }

        let draggedElement = null;

        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.name);
            tooltip.style.opacity = '0';
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            draggedElement = null;
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            e.dataTransfer.dropEffect = 'move';

            this.classList.add('drag-over');

            const afterElement = getDragAfterElement(this, e.clientX, e.clientY);
            if (afterElement == null) {
                this.appendChild(draggedElement);
            } else {
                if (draggedElement !== afterElement) {
                    this.insertBefore(draggedElement, afterElement);
                }
            }
            return false;
        }

        function getDragAfterElement(container, x, y) {
            const draggableElements = [...container.querySelectorAll('.logo-item-wrapper:not(.dragging)')];

            for (const child of draggableElements) {
                const box = child.getBoundingClientRect();

                // Cursor is completely above this element's row
                if (y < box.top - 10) {
                    return child;
                }

                // Cursor is on this element's row
                if (y >= box.top - 10 && y <= box.bottom + 10) {
                    if (x < box.left + box.width / 2) {
                        return child;
                    }
                }
            }
            return null;
        }

        function handleDragLeave(e) {
            if (!this.contains(e.relatedTarget)) {
                this.classList.remove('drag-over');
            }
        }

        function rebuildTierDict() {
            const updatedDict = {};
            ['S', 'A', 'B', 'C', 'D', 'E', 'F'].forEach(tier => {
                updatedDict[tier] = {};
                const tierContainer = document.querySelector(`.tier-content[data-tier="${tier}"]`);
                if (tierContainer) {
                    const items = tierContainer.querySelectorAll('.logo-item-wrapper');
                    items.forEach(item => {
                        const name = item.dataset.name;
                        // update the tier data on the DOM element too
                        item.dataset.tier = tier;

                        let info = null;
                        for (let t of ['S', 'A', 'B', 'C', 'D', 'E', 'F']) {
                            if (globalTierDict[t] && globalTierDict[t][name]) {
                                info = globalTierDict[t][name];
                                break;
                            }
                        }
                        if (info) {
                            updatedDict[tier][name] = info;
                        }
                    });
                }
            });
            globalTierDict = updatedDict;
        }

        async function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            this.classList.remove('drag-over');

            if (draggedElement) {
                rebuildTierDict();
                await saveToServer();
            }
            return false;
        }

        async function saveToServer() {
            saveIndicator.textContent = "Saving...";
            saveIndicator.className = "save-indicator saving";

            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(globalTierDict)
                });

                if (res.ok) {
                    saveIndicator.textContent = "Saved!";
                    saveIndicator.className = "save-indicator saved";
                    setTimeout(() => {
                        saveIndicator.style.display = "";
                        saveIndicator.className = "save-indicator";
                    }, 2000);
                } else {
                    throw new Error("Bad response");
                }
            } catch (err) {
                saveIndicator.textContent = "Error saving!";
                saveIndicator.className = "save-indicator error";
            }
        }

        // Modal Logic
        const editName = document.getElementById('edit-name');
        const editTier = document.getElementById('edit-tier');
        const editPrice = document.getElementById('edit-price');
        const editYear = document.getElementById('edit-year');
        const editYearFirst = document.getElementById('edit-year-first');
        const editAddress = document.getElementById('edit-address');
        const editDescription = document.getElementById('edit-description');
        const editVegan = document.getElementById('edit-vegan');

        const editOriginalName = document.getElementById('edit-original-name');
        const editMode = document.getElementById('edit-mode');
        const editLogoPath = document.getElementById('edit-logo-path');
        const modalTitle = document.getElementById('modal-title');

        const btnSave = document.getElementById('btn-save');
        let initialFormState = "";

        function checkFormChanged() {
            const currentState = getFormState();
            const hasChanged = currentState !== initialFormState;

            // Filename character validation
            const invalidChars = /[<>:"/\\|?*]/;
            const isNameInvalid = invalidChars.test(editName.value);

            if (isNameInvalid) {
                editName.classList.add('invalid-input');
                editName.setCustomValidity("Invalid characters for filename");
            } else {
                editName.classList.remove('invalid-input');
                editName.setCustomValidity("");
            }

            const isValid = editForm.checkValidity();
            btnSave.disabled = !hasChanged || !isValid || isNameInvalid;
        }

        function getFormState() {
            return JSON.stringify({
                name: editName.value.trim(),
                tier: editTier.value,
                price: editPrice.value,
                year: editYear.value,
                yearFirst: editYearFirst.value,
                address: editAddress.value.trim(),
                description: editDescription.value.trim(),
                vegan: editVegan.checked
            });
        }

        // Attach change listeners to all form inputs
        [editName, editTier, editPrice, editYear, editYearFirst, editAddress, editDescription, editVegan].forEach(el => {
            el.addEventListener('input', checkFormChanged);
            el.addEventListener('change', checkFormChanged);
        });

        function openEditModal(name, tier, info) {
            editName.classList.remove('invalid-input');
            editName.setCustomValidity("");

            editMode.value = 'edit';
            modalTitle.textContent = 'Edit Metadata';
            modalImg.src = info.path_to_logo_image;
            editLogoPath.value = info.path_to_logo_image;
            editOriginalName.value = name;

            editName.value = name;
            editTier.value = tier;
            editPrice.value = info.price || '1';
            editYear.value = info.year || new Date().getFullYear();
            editYearFirst.value = info.year_first_visited || new Date().getFullYear();
            editAddress.value = info.address || '';
            editDescription.value = info.description || '';
            editVegan.checked = !!info.vegan;

            initialFormState = getFormState();
            btnSave.disabled = true;

            showModal();
        }

        function openCreateModal(logoFilename) {
            editName.classList.remove('invalid-input');
            editName.setCustomValidity("");

            editMode.value = 'create';
            modalTitle.textContent = 'Add New Restaurant';
            const path = 'logos/' + logoFilename;
            modalImg.src = path;
            editLogoPath.value = path;

            const guessedName = logoFilename.replace(/\.[^/.]+$/, "");
            editOriginalName.value = '';

            editName.value = guessedName;
            editTier.value = 'S';
            editPrice.value = '1';
            editYear.value = new Date().getFullYear();
            editYearFirst.value = new Date().getFullYear();
            editAddress.value = '';
            editDescription.value = '';
            editVegan.checked = false;

            initialFormState = getFormState();
            btnSave.disabled = true;

            showModal();
        }

        function showModal() {
            editModal.style.display = 'flex';
            setTimeout(() => { editModal.style.opacity = '1'; }, 10);
        }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const mode = editMode.value;
            const origName = editOriginalName.value;

            const name = editName.value.trim();
            const tier = editTier.value;
            const price = editPrice.value ? parseInt(editPrice.value) : null;

            let newInfo = {};
            if (mode === 'edit') {
                for (let t of ['S', 'A', 'B', 'C', 'D', 'E', 'F']) {
                    if (globalTierDict[t] && globalTierDict[t][origName]) {
                        newInfo = { ...globalTierDict[t][origName] };
                        delete globalTierDict[t][origName];
                        break;
                    }
                }
            }

            newInfo.path_to_logo_image = editLogoPath.value;
            if (price) {
                newInfo.price = price;
            } else {
                delete newInfo.price;
            }
            if (editYear.value) {
                newInfo.year = parseInt(editYear.value);
            } else {
                delete newInfo.year;
            }
            if (editYearFirst.value) {
                newInfo.year_first_visited = parseInt(editYearFirst.value);
            } else {
                delete newInfo.year_first_visited;
            }
            if (editAddress.value.trim()) {
                newInfo.address = editAddress.value.trim();
            } else {
                delete newInfo.address;
            }
            if (editDescription.value.trim()) {
                newInfo.description = editDescription.value.trim();
            } else {
                delete newInfo.description;
            }
            if (editVegan.checked) {
                newInfo.vegan = true;
            } else {
                delete newInfo.vegan;
            }

            // Handle potential file rename if name changed and in edit mode
            if (mode === 'edit' && name !== origName) {
                const oldPath = editLogoPath.value;
                const ext = oldPath.split('.').pop();
                const newPath = `logos/${name}.${ext}`;
                newInfo.path_to_logo_image = newPath;

                try {
                    await fetch('/api/rename_logo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ old_path: oldPath, new_path: newPath })
                    });
                } catch (e) {
                    console.error("Failed to rename logo file", e);
                }
            } else if (mode === 'create') {
                unassignedLogos = unassignedLogos.filter(l => `logos/${l}` !== editLogoPath.value);
                updateUnassignedDropdown();

                // For new files, rename immediately if name string doesn't match original logo
                if (name !== origName) {
                    const oldPath = editLogoPath.value;
                    const ext = oldPath.split('.').pop();
                    const newPath = `logos/${name}.${ext}`;
                    newInfo.path_to_logo_image = newPath;

                    try {
                        await fetch('/api/rename_logo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ old_path: oldPath, new_path: newPath })
                        });
                    } catch (e) {
                        console.error("Failed to rename logo file", e);
                    }
                }
            }

            // Insert into correct tier, sorted by price
            if (!globalTierDict[tier]) globalTierDict[tier] = {};

            // Build new tier dict maintaining price sort (if new price > existing price)
            const newTierItems = {};
            let inserted = false;
            const pVal = price || 0;

            for (const [k, v] of Object.entries(globalTierDict[tier])) {
                const itemP = v.price || 0;
                if (!inserted && itemP > pVal) {
                    newTierItems[name] = newInfo;
                    inserted = true;
                }
                newTierItems[k] = v;
            }
            if (!inserted) {
                newTierItems[name] = newInfo;
            }
            globalTierDict[tier] = newTierItems;

            editModal.style.opacity = '0';
            setTimeout(() => { editModal.style.display = 'none'; }, 300);

            // Rebuild or update DOM directly
            let wrapper = null;
            if (mode === 'edit') {
                wrapper = document.querySelector(`.logo-item-wrapper[data-name="${origName}"]`);
            }

            if (!wrapper) {
                // creating new
                wrapper = document.createElement('div');
                wrapper.className = 'logo-item-wrapper';
                wrapper.draggable = true;

                // attach events
                wrapper.addEventListener('mouseenter', e => {
                    tooltip.textContent = wrapper.dataset.name;
                    tooltip.style.opacity = '1';
                });
                wrapper.addEventListener('mousemove', e => {
                    tooltip.style.left = (e.pageX + 15) + 'px';
                    tooltip.style.top = (e.pageY + 15) + 'px';
                });
                wrapper.addEventListener('mouseleave', e => {
                    tooltip.style.opacity = '0';
                });
                wrapper.addEventListener('dragstart', handleDragStart);
                wrapper.addEventListener('dragend', handleDragEnd);
                wrapper.addEventListener('dblclick', function () {
                    const curName = this.dataset.name;
                    const curTier = this.dataset.tier;
                    const curInfo = globalTierDict[curTier][curName];
                    openEditModal(curName, curTier, curInfo);
                });
            }

            wrapper.dataset.name = name;
            wrapper.dataset.tier = tier;
            wrapper.innerHTML = '';

            const img = document.createElement('img');
            img.src = newInfo.path_to_logo_image;
            img.className = 'logo-item';
            img.alt = name;
            img.loading = "lazy";
            img.decoding = "async";
            wrapper.appendChild(img);

            if (newInfo.price) {
                const priceImg = document.createElement('img');
                priceImg.src = `assets/png/${newInfo.price}.png`;
                priceImg.className = 'price-tag';
                wrapper.appendChild(priceImg);
            }

            if (newInfo.vegan) {
                const veganImg = document.createElement('img');
                veganImg.src = `assets/png/Vegan.png`;
                veganImg.className = 'vegan-tag';
                wrapper.appendChild(veganImg);
            }

            // Move wrapper to correct position in DOM based on globalTierDict
            const tierContent = document.querySelector(`.tier-content[data-tier="${tier}"]`);
            const keys = Object.keys(globalTierDict[tier]);
            keys.forEach(k => {
                const el = (k === name) ? wrapper : document.querySelector(`.logo-item-wrapper[data-name="${k}"]`);
                if (el) {
                    tierContent.appendChild(el);
                }
            });

            await saveToServer();
        });

        init();
    </script>
</body>
